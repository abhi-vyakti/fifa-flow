<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </radialGradient>

    <!-- Gold Metallic Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A" />
      <stop offset="30%" stop-color="#F59E0B" />
      <stop offset="70%" stop-color="#B45309" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>

    <!-- Emerald Accent Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Trophy Glow Drop Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Badge Outer Frame -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5" />
  <circle cx="32" cy="32" r="27.5" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3 3" />

  <!-- World Cup Trophy Icon Group -->
  <g filter="url(#glow)">
    <!-- Globe at Top of Trophy -->
    <circle cx="32" cy="18" r="8.5" fill="url(#goldGrad)" />
    <!-- Globe Continents / Lines -->
    <path d="M 24.5 18 A 7.5 7.5 0 0 0 39.5 18 Z" fill="#059669" opacity="0.4" />
    <circle cx="32" cy="18" r="8.5" fill="none" stroke="#FEF08A" stroke-width="0.8" stroke-opacity="0.6" />

    <!-- Supporting Figures / Arms Holding Globe -->
    <path d="M 23 24 Q 26 21 32 24 Q 38 21 41 24 Q 38 31 34 35 L 30 35 Q 26 31 23 24 Z" fill="url(#goldGrad)" />

    <!-- Trophy Stem / Torso -->
    <path d="M 27 33 L 37 33 L 35 44 L 29 44 Z" fill="url(#goldGrad)" />

    <!-- Emerald Malachite Rings Base -->
    <rect x="25" y="44" width="14" height="2.5" rx="1" fill="url(#emeraldGrad)" />
    <rect x="23.5" y="47.5" width="17" height="2.5" rx="1" fill="url(#emeraldGrad)" />

    <!-- Trophy Solid Base -->
    <path d="M 22 51 L 42 51 L 44 55 A 1 1 0 0 1 43 56 L 21 56 A 1 1 0 0 1 20 55 Z" fill="url(#goldGrad)" />
  </g>

  <!-- Soccer Ball Pentagon Details -->
  <polygon points="32,13 34.5,15 33.5,17.5 30.5,17.5 29.5,15" fill="#0F172A" opacity="0.75" />
</svg>